version: '3.8'

services:
  sqlserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: sqlserver-aw:1.0
    container_name: ${CONTAINER_NAME}
    hostname: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "${MSSQL_PID}"
      MSSQL_LCID: "${MSSQL_LCID}"
    ports:
      - "${MSSQL_CONTAINER_PORT}:1433"
    volumes:
      - sqldata:/var/opt/mssql/data
      - sqlbackup:/var/opt/mssql/backup
      - sqllog:/var/opt/mssql/log
    networks:
      - sql-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "${MSSQL_SA_PASSWORD}" -C -No -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    mem_limit: ${CONTAINER_MEMORY}
    cpus: "${CONTAINER_CPUS}"

networks:
  sql-network:
    driver: bridge

volumes:
  sqldata:
    driver: local
  sqlbackup:
    driver: local
  sqllog:
    driver: local